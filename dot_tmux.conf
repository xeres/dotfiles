set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g prefix C-z

bind z send-prefix
bind C-z last-window

bind e \
    setw synchronize-panes \;\
    display 'Toggled synchronize-panes to #{?pane_synchronized,on,off}'

bind R \
    source-file ~/.tmux.conf \;\
    display 'Reloaded ~/.tmux.conf'

bind C-q display-panes

run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

if-shell -b '[ "$(echo "$TMUX_VERSION < 2.1" | bc)" = 1 ]' \
    "set -g mouse-select-pane on; set -g mode-mouse on; set -g mouse-resize-pane on; set -g mouse-select-window on"

if-shell -b '[ "$(echo "$TMUX_VERSION >= 2.1" | bc)" = 1 ]' \
    "set -g mouse on"

set -g default-terminal 'screen-256color'

set -g base-index 1
set -g pane-base-index 1

set -g history-limit 50000

set -g display-time 4000
set -g display-panes-time 4000
set -g status-interval 1

if-shell -b '[ "$(echo "$TMUX_VERSION < 2.3" | bc)" = 1 ]' \
    "set -g window-style 'bg=colour235'; set -g window-active-style 'bg=colour232'; set -g status-style 'fg=colour255,bg=colour238'"

set -g status-left  '#[fg=colour255,bg=colour241][#I][#P] #[default]'
set -g status-right '#[fg=colour255,bg=colour241][#S] LA: #(cut -d" " -f-3 /proc/loadavg) | %m/%d(%a) %T '
set -g status-right-length 100

setw -g window-status-format ' #I: #W '
setw -g window-status-current-format '#[fg=colour255,bg=colour27,bold] #I: #W #[default]'

run -b '~/.tmux/plugins/tpm/tpm'
